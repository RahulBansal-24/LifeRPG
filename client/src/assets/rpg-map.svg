<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="650" fill="#2a2a3e"/>
  
  <!-- Mountain Range (Top Right) -->
  <path d="M 650 50 L 700 20 L 750 50 L 780 30 L 820 60 L 850 40 L 880 70 L 880 150 L 650 150 Z" 
        fill="#4a5568" stroke="#2d3748" stroke-width="2"/>
  <path d="M 680 80 L 700 60 L 720 80 Z" fill="#718096"/>
  <path d="M 750 90 L 770 70 L 790 90 Z" fill="#718096"/>
  
  <!-- Forest Area (Left) -->
  <ellipse cx="120" cy="200" rx="80" ry="60" fill="#2d5a3d" opacity="0.8"/>
  <ellipse cx="100" cy="180" rx="40" ry="30" fill="#38a169" opacity="0.7"/>
  <ellipse cx="140" cy="220" rx="35" ry="25" fill="#38a169" opacity="0.7"/>
  <ellipse cx="80" cy="230" rx="30" ry="20" fill="#48bb78" opacity="0.6"/>
  
  <!-- River -->
  <path d="M 200 100 Q 300 150 400 200 T 600 300 Q 700 350 750 400" 
        stroke="#4299e1" stroke-width="8" fill="none" opacity="0.6"/>
  <path d="M 200 100 Q 300 150 400 200 T 600 300 Q 700 350 750 400" 
        stroke="#63b3ed" stroke-width="4" fill="none" opacity="0.8"/>
  
  <!-- Lake -->
  <ellipse cx="400" cy="400" rx="80" ry="50" fill="#2b6cb0" opacity="0.7"/>
  <ellipse cx="400" cy="400" rx="60" ry="35" fill="#3182ce" opacity="0.8"/>
  
  <!-- Village (Center) -->
  <rect x="420" y="280" width="60" height="40" fill="#975a16" stroke="#744210" stroke-width="2"/>
  <polygon points="420,280 450,250 480,280" fill="#8b4513"/>
  <rect x="430" y="290" width="15" height="15" fill="#4a5568"/>
  <rect x="455" y="290" width="15" height="15" fill="#4a5568"/>
  
  <!-- Castle (Top Right) -->
  <rect x="750" y="80" width="80" height="100" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>
  <rect x="760" y="60" width="60" height="20" fill="#718096"/>
  <rect x="770" y="40" width="40" height="20" fill="#718096"/>
  <rect x="780" y="20" width="20" height="20" fill="#a0aec0"/>
  <rect x="765" y="100" width="20" height="30" fill="#2d3748"/>
  <rect x="795" y="100" width="20" height="30" fill="#2d3748"/>
  
  <!-- Beach Area (Bottom Right) -->
  <ellipse cx="700" cy="550" rx="100" ry="40" fill="#f6e05e" opacity="0.6"/>
  <ellipse cx="700" cy="550" rx="80" ry="30" fill="#f6ad55" opacity="0.7"/>
  
  <!-- Merchant Area (Bottom Left) -->
  <rect x="150" y="480" width="40" height="30" fill="#805ad5" stroke="#6b46c1" stroke-width="2"/>
  <polygon points="150,480 170,460 190,480" fill="#9f7aea"/>
  <rect x="160" y="490" width="10" height="10" fill="#4a5568"/>
  
  <!-- Path/Trail -->
  <path d="M 50 500 Q 150 450 250 400 T 450 300 Q 550 250 650 200 T 850 100" 
        stroke="#8b7355" stroke-width="3" fill="none" opacity="0.4" stroke-dasharray="5,5"/>
  
  <!-- Trees for decoration -->
  <circle cx="250" cy="300" r="15" fill="#2d5a3d"/>
  <circle cx="350" cy="250" r="12" fill="#38a169"/>
  <circle cx="550" cy="350" r="18" fill="#2d5a3d"/>
  <circle cx="650" cy="400" r="14" fill="#38a169"/>
  
  <!-- Rocks -->
  <ellipse cx="300" cy="500" rx="20" ry="10" fill="#4a5568"/>
  <ellipse cx="500" cy="450" rx="15" ry="8" fill="#718096"/>
  <ellipse cx="600" cy="500" rx="18" ry="9" fill="#4a5568"/>
  
  <!-- Bridge over river -->
  <rect x="380" y="195" width="40" height="10" fill="#8b4513" stroke="#654321" stroke-width="1"/>
  
  <!-- Small huts -->
  <rect x="320" cy="320" width="25" height="20" fill="#975a16" stroke="#744210" stroke-width="1"/>
  <polygon points="320,320 332.5,305 345,320" fill="#8b4513"/>
  
  <rect x="520" cy="380" width="25" height="20" fill="#975a16" stroke="#744210" stroke-width="1"/>
  <polygon points="520,380 532.5,365 545,380" fill="#8b4513"/>
</svg>
